name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stocksense
          POSTGRES_PASSWORD: stocksense
          POSTGRES_DB: stocksense
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://stocksense:stocksense@localhost/stocksense

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        env:
          PGPASSWORD: stocksense
        run: psql -h localhost -U stocksense -d stocksense -f migrations/001_init.sql

      - name: Lint (ruff)
        run: ruff check src/ dags/ tests/

      - name: Type check (mypy)
        run: mypy src/ dags/ tests/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
