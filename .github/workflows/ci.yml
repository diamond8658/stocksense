name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stocksense
          POSTGRES_PASSWORD: stocksense
          POSTGRES_DB: stocksense
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://stocksense:stocksense@localhost/stocksense

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        env:
          PGPASSWORD: stocksense
        run: psql -h localhost -U stocksense -d stocksense -f migrations/001_init.sql

      - name: Lint (ruff)
        run: ruff check src/ dags/ tests/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile -t stocksense-api:${{ github.sha }} .

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker tag stocksense-api:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/stocksense-api:${{ github.sha }}
          docker tag stocksense-api:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/stocksense-api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/stocksense-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/stocksense-api:latest
