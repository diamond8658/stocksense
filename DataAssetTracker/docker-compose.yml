services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=dat;Username=dat;Password=dat
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dat
      POSTGRES_PASSWORD: dat
      POSTGRES_DB: dat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
